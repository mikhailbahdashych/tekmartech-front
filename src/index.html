<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tekmar</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <app-root>
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--color-bg-secondary, #f8f9fb);" data-testid="app-initializing-spinner">
      <div style="width:40px;height:40px;border:3px solid var(--color-border-primary, #e2e5ea);border-top-color:var(--color-accent, #6366f1);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </app-root>
</body>
</html>
