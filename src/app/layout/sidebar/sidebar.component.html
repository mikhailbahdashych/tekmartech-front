<aside class="sidebar" data-testid="sidebar-container">
  <!-- Brand -->
  <div class="sidebar__brand">
    <span class="sidebar__brand-text" data-testid="sidebar-brand-text">Tekmar</span>
  </div>

  <!-- New Query button -->
  <div class="sidebar__action">
    <a routerLink="/queries"
       class="sidebar__new-query"
       data-testid="sidebar-new-query-button">
      <lucide-icon [img]="icons.Plus" [size]="18" [strokeWidth]="2"></lucide-icon>
      New Query
    </a>
  </div>

  <!-- Navigation links -->
  <nav class="sidebar__nav">
    @for (item of visibleNavItems(); track item.route) {
      <a [routerLink]="item.route"
         routerLinkActive="active-link"
         [routerLinkActiveOptions]="{ exact: item.route === '/queries' }"
         class="sidebar__nav-link"
         [attr.data-testid]="item.testId">
        <lucide-icon [img]="item.icon" [size]="18" [strokeWidth]="1.5"></lucide-icon>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Spacer -->
  <div class="sidebar__spacer"></div>

  <!-- User section -->
  @if (user(); as u) {
    <div class="sidebar__user">
      <div class="sidebar__user-row">
        <div class="sidebar__avatar">
          {{ userInitials() }}
        </div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name" data-testid="sidebar-user-name">{{ u.display_name }}</div>
          <span class="sidebar__role"
                data-testid="sidebar-user-role-badge"
                [class.sidebar__role--admin]="u.role === 'admin'">
            {{ u.role === 'admin' ? 'Admin' : 'Member' }}
          </span>
        </div>
        <button (click)="onLogout()"
                class="sidebar__logout"
                title="Logout"
                data-testid="sidebar-logout-button">
          <lucide-icon [img]="icons.LogOut" [size]="18" [strokeWidth]="1.5"></lucide-icon>
        </button>
      </div>
    </div>
  }
</aside>
