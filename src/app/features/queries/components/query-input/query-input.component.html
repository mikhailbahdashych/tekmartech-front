<div class="query-input">
  <tk-textarea
    label=""
    placeholder="Ask a question about your infrastructure..."
    [rows]="3"
    [formControl]="queryControl"
    [testId]="'query-input-textarea'"
    (keydown)="onKeydown($event)" />

  <div class="query-input__footer">
    <span class="query-input__hint">Press Ctrl+Enter to submit</span>
    <tk-button
      variant="primary"
      [disabled]="queryControl.invalid || isSubmitting() || disabled()"
      [loading]="isSubmitting()"
      (click)="onSubmit()"
      data-testid="query-submit-button">
      <tk-icon [name]="icons.Send" size="sm" />
      Run Query
    </tk-button>
  </div>
</div>
