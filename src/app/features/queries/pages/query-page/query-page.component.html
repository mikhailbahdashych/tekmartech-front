@if (store.phase() === 'idle' && !store.queryText()) {
  <!-- Centered welcome state -->
  <div class="query-page query-page--welcome">
    <div class="query-page__welcome-center">
      <h1 class="query-page__greeting">Hey there, {{ firstName() }}</h1>

      <div class="query-page__welcome-input">
        <app-chat-input
          [isSubmitting]="store.isSubmitting()"
          [disabled]="false"
          placeholder="How can I help you today?"
          (submitQuery)="onSubmit($event)" />

        @if (selectableIntegrations().length > 1) {
          <tk-integration-selector
            [integrations]="selectableIntegrations()"
            [selectedIds]="selectedIntegrationIds()"
            [disabled]="false"
            (selectionChange)="selectedIntegrationIds.set($event)" />
        }
      </div>
    </div>
  </div>
} @else {
  <!-- Active conversation layout -->
  <div class="query-page query-page--active">
    <div class="query-page__thread-area" #threadArea>
      <app-query-thread
        [integrationMap]="integrationMap()"
        (approve)="onApprove()"
        (reject)="onReject()"
        (exportCsv)="onExportCsv()"
        (newQuery)="onNewQuery()" />
    </div>

    <div class="query-page__input-area">
      <app-chat-input
        [isSubmitting]="store.isSubmitting()"
        [disabled]="store.phase() !== 'idle'"
        (submitQuery)="onSubmit($event)" />
    </div>
  </div>
}
