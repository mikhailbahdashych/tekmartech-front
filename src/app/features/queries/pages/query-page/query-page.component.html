@if (store.phase() === 'idle' && !store.queryText()) {
  <!-- Centered welcome state -->
  <div class="query-page query-page--welcome">
    <div class="query-page__welcome-center">
      <h1 class="query-page__greeting">Hey there, {{ firstName() }}</h1>

      <div class="query-page__welcome-input">
        <chat-input
          [isSubmitting]="store.isSubmitting()"
          [disabled]="false"
          placeholder="How can I help you today?"
          (submitQuery)="onSubmit($event)" />

        @if (selectableIntegrations().length > 0) {
          <div class="query-page__integrations-bar">
            <button class="query-page__integrations-trigger"
                    data-testid="query-integrations-bar"
                    (click)="integrationsPanelOpen.set(!integrationsPanelOpen())">
              <span class="query-page__integrations-label">Available integrations</span>
              <div class="query-page__integrations-preview">
                @for (integration of selectableIntegrations(); track integration.id) {
                  <tk-integration-icon [type]="integration.type" size="sm" />
                }
                <tk-icon
                  [name]="icons.ChevronRight"
                  size="sm"
                  [strokeWidth]="1.5"
                  class="query-page__integrations-chevron"
                  [class.query-page__integrations-chevron--open]="integrationsPanelOpen()" />
              </div>
            </button>

            @if (integrationsPanelOpen()) {
              <div class="query-page__integrations-panel">
                <tk-integration-selector
                  [integrations]="selectableIntegrations()"
                  [selectedIds]="selectedIntegrationIds()"
                  [disabled]="false"
                  (selectionChange)="selectedIntegrationIds.set($event)" />
              </div>
            }
          </div>
        }
      </div>
    </div>
  </div>
} @else {
  <!-- Active conversation layout -->
  <div class="query-page query-page--active">
    <div class="query-page__thread-area" #threadArea (scroll)="onThreadScroll($event)">
      <query-thread
        [integrationMap]="integrationMap()"
        (approve)="onApprove()"
        (reject)="onReject()"
        (exportCsv)="onExportCsv()"
        (newQuery)="onNewQuery()" />

      <!-- Scroll to bottom button -->
      @if (showScrollButton()) {
        <button class="query-page__scroll-btn" (click)="scrollToBottom()">
          <tk-icon [name]="icons.ChevronDown" size="sm" [strokeWidth]="2" />
        </button>
      }
    </div>

    <div class="query-page__input-area">
      <chat-input
        [isSubmitting]="store.isSubmitting()"
        [disabled]="store.phase() !== 'idle'"
        (submitQuery)="onSubmit($event)" />
    </div>
  </div>
}
