<div [attr.data-testid]="data.testIdPrefix ? data.testIdPrefix + '-dialog' : null">
  <h2 mat-dialog-title class="dialog-title">{{ data.title }}</h2>
  <mat-dialog-content>
    <p class="dialog-message">{{ data.message }}</p>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <tk-button variant="secondary" (click)="dialogRef.close(false)" [attr.data-testid]="data.testIdPrefix ? data.testIdPrefix + '-cancel-button' : null">Cancel</tk-button>
    <tk-button
      [variant]="data.confirmColor === 'warn' ? 'destructive' : 'primary'"
      (click)="dialogRef.close(true)"
      [attr.data-testid]="data.testIdPrefix ? data.testIdPrefix + '-confirm-button' : null">
      {{ data.confirmLabel }}
    </tk-button>
  </mat-dialog-actions>
</div>
