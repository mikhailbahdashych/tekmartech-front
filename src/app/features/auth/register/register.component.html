<div class="auth-page">
  <div class="auth-container">
    <!-- Brand -->
    <div class="auth-brand">
      <h1 class="auth-brand__text">Tekmar</h1>
    </div>

    <!-- Card -->
    <tk-card padding="lg">
      <h2 class="auth-heading">Create your account</h2>

      <!-- Error message -->
      @if (errorMessage(); as error) {
        <div data-testid="register-error-text" class="alert alert--error">
          {{ error }}
        </div>
      }

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
        <!-- Organization Name -->
        <tk-input
          label="Organization Name"
          autocomplete="organization"
          formControlName="organization_name"
          [testId]="'register-org-name-input'"
          [error]="registerForm.controls.organization_name.touched && registerForm.controls.organization_name.hasError('required')
            ? 'Organization name is required'
            : registerForm.controls.organization_name.touched && registerForm.controls.organization_name.hasError('minlength')
              ? 'Must be at least 2 characters'
              : null" />

        <!-- Display Name -->
        <tk-input
          label="Your Name"
          autocomplete="name"
          formControlName="display_name"
          [testId]="'register-display-name-input'"
          [error]="registerForm.controls.display_name.touched && registerForm.controls.display_name.hasError('required')
            ? 'Name is required'
            : null" />

        <!-- Email -->
        <tk-input
          label="Email"
          placeholder="you@company.com"
          type="email"
          autocomplete="email"
          formControlName="email"
          [testId]="'register-email-input'"
          [error]="registerForm.controls.email.touched && registerForm.controls.email.hasError('required')
            ? 'Email is required'
            : registerForm.controls.email.touched && registerForm.controls.email.hasError('email')
              ? 'Please enter a valid email'
              : null" />

        <!-- Password -->
        <tk-input
          label="Password"
          type="password"
          autocomplete="new-password"
          formControlName="password"
          [testId]="'register-password-input'"
          [error]="registerForm.controls.password.touched && registerForm.controls.password.hasError('required')
            ? 'Password is required'
            : registerForm.controls.password.touched && registerForm.controls.password.hasError('minlength')
              ? 'Must be at least 8 characters'
              : null" />

        <!-- Confirm Password -->
        <tk-input
          label="Confirm Password"
          type="password"
          autocomplete="new-password"
          formControlName="confirm_password"
          [testId]="'register-confirm-password-input'"
          [error]="registerForm.controls.confirm_password.touched && registerForm.controls.confirm_password.hasError('required')
            ? 'Please confirm your password'
            : registerForm.controls.confirm_password.touched && registerForm.hasError('passwordMismatch')
              ? 'Passwords do not match'
              : null" />

        <!-- Submit -->
        <tk-button
          variant="primary"
          type="submit"
          [disabled]="isLoading()"
          [loading]="isLoading()"
          data-testid="register-submit-button">
          Create account
        </tk-button>
      </form>
    </tk-card>

    <!-- Link to login -->
    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login" class="auth-link" data-testid="register-login-link">Sign in</a>
    </p>
  </div>
</div>
