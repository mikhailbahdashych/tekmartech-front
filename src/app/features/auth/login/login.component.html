<div class="auth-page">
  <div class="auth-container">
    <!-- Brand -->
    <div class="auth-brand">
      <h1 class="auth-brand__text">Tekmar</h1>
    </div>

    <!-- Card -->
    <tk-card padding="lg">
      <h2 class="auth-heading">Sign in to your account</h2>

      <!-- Info message (invitation pending) -->
      @if (infoMessage(); as info) {
        <div data-testid="login-invitation-pending-text" class="alert alert--info">
          {{ info }}
        </div>
      }

      <!-- Error message -->
      @if (errorMessage(); as error) {
        <div data-testid="login-error-text" class="alert alert--error">
          {{ error }}
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <!-- Email -->
        <tk-input
          label="Email"
          placeholder="you@company.com"
          type="email"
          autocomplete="email"
          formControlName="email"
          [testId]="'login-email-input'"
          [error]="loginForm.controls.email.touched && loginForm.controls.email.hasError('required')
            ? 'Email is required'
            : loginForm.controls.email.touched && loginForm.controls.email.hasError('email')
              ? 'Please enter a valid email'
              : null" />

        <!-- Password -->
        <tk-input
          label="Password"
          type="password"
          autocomplete="current-password"
          formControlName="password"
          [testId]="'login-password-input'"
          [error]="loginForm.controls.password.touched && loginForm.controls.password.hasError('required')
            ? 'Password is required'
            : null" />

        <!-- Submit -->
        <tk-button
          variant="primary"
          type="submit"
          [disabled]="isLoading()"
          [loading]="isLoading()"
          data-testid="login-submit-button">
          Sign in
        </tk-button>
      </form>
    </tk-card>

    <!-- Link to register -->
    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/register" class="auth-link" data-testid="login-register-link">Sign up</a>
    </p>
  </div>
</div>
