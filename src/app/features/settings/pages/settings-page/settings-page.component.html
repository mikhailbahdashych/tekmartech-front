<div class="page-container" data-testid="settings-container">
  <div class="page-header">
    <h1 class="page-title">Organization Settings</h1>
  </div>

  @if (isLoading()) {
    <div class="loading-container">
      <tk-spinner size="md" />
    </div>
  }

  @if (org(); as o) {
    <tk-card padding="lg">
      <div class="settings-content">
        <!-- Organization Name -->
        <div class="setting-row">
          <label class="setting-label">Organization Name</label>
          <div class="name-row">
            <tk-input [formControl]="nameControl" testId="settings-org-name-input" />
            <tk-button
              variant="primary"
              [loading]="isSaving()"
              [disabled]="isSaving() || nameControl.invalid"
              (click)="saveName()"
              data-testid="settings-org-name-save-button">
              Update
            </tk-button>
          </div>
        </div>

        <!-- Subscription Tier -->
        <div class="setting-row">
          <label class="setting-label">Subscription Tier</label>
          <div class="tier-row">
            <tk-badge variant="neutral" [label]="o.subscription_tier" data-testid="settings-subscription-badge" />
            <span class="tier-hint">Contact us to upgrade</span>
          </div>
        </div>

        <!-- Organization ID -->
        <div class="setting-row">
          <label class="setting-label">Organization ID</label>
          <div class="id-row">
            <code class="org-id" data-testid="settings-org-id-text">{{ o.id }}</code>
            <button class="copy-btn" (click)="copyId()" title="Copy ID" data-testid="settings-org-id-copy-button">
              <tk-icon [name]="copied() ? icons.Check : icons.Copy" size="sm" />
            </button>
          </div>
        </div>

        <!-- Created -->
        <div class="setting-row">
          <label class="setting-label">Created</label>
          <span class="setting-value" data-testid="settings-created-at-text">{{ o.created_at | date:'mediumDate' }}</span>
        </div>
      </div>
    </tk-card>
  }
</div>
