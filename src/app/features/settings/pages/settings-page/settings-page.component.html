<div class="max-w-3xl mx-auto">
  <div class="mb-6">
    <h1 class="font-heading text-xl font-semibold text-slate-900">Organization Settings</h1>
  </div>

  @if (isLoading()) {
    <div class="flex justify-center py-12"><mat-spinner diameter="24"></mat-spinner></div>
  }

  @if (org(); as o) {
    <div class="settings-card space-y-6">
      <!-- Organization Name -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Organization Name</label>
        <div class="flex items-center gap-3">
          <mat-form-field appearance="outline" class="flex-1 compact-field">
            <input matInput [formControl]="nameControl" (keydown.enter)="saveName()">
          </mat-form-field>
          <button mat-flat-button class="save-btn" [disabled]="isSaving() || nameControl.invalid" (click)="saveName()">
            @if (isSaving()) {
              <mat-spinner diameter="16" class="inline-spinner"></mat-spinner>
            } @else {
              Update
            }
          </button>
        </div>
      </div>

      <!-- Subscription Tier -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Subscription Tier</label>
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600">
            {{ o.subscription_tier }}
          </span>
          <span class="text-xs text-slate-400">Contact us to upgrade</span>
        </div>
      </div>

      <!-- Organization ID -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Organization ID</label>
        <div class="flex items-center gap-2">
          <code class="font-mono text-xs text-slate-600 bg-slate-50 px-2.5 py-1.5 rounded border border-slate-200">
            {{ o.id }}
          </code>
          <button mat-icon-button class="copy-btn" (click)="copyId()" title="Copy ID">
            <lucide-icon [img]="copied() ? icons.Check : icons.Copy" [size]="14" [strokeWidth]="2"
                         [class]="copied() ? 'text-emerald-500' : 'text-slate-400'">
            </lucide-icon>
          </button>
        </div>
      </div>

      <!-- Created -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Created</label>
        <span class="text-sm text-slate-600">{{ o.created_at | date:'mediumDate' }}</span>
      </div>
    </div>
  }
</div>
